services:
  orderer.farm2fork.com:
    image: hyperledger/fabric-orderer:${FABRIC_VERSION:-3.1.4}
    container_name: orderer.farm2fork.com
    environment:
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    ports:
      - "7050:7050"
      - "9443:9443"
    volumes:
      - ../organizations/ordererOrganizations/farm2fork.com/orderers/orderer.farm2fork.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/farm2fork.com/orderers/orderer.farm2fork.com/tls:/var/hyperledger/orderer/tls
      - orderer.farm2fork.com:/var/hyperledger/production/orderer

  peer0.farm2fork.com:
    image: hyperledger/fabric-peer:${FABRIC_VERSION:-3.1.4}
    container_name: peer0.farm2fork.com
    environment:
      - CORE_PEER_ID=peer0.farm2fork.com
      - CORE_PEER_ADDRESS=peer0.farm2fork.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_LOCALMSPID=Farm2ForkMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=goleveldb
    ports:
      - "7051:7051"
    volumes:
      - ../organizations/peerOrganizations/farm2fork.com/peers/peer0.farm2fork.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/farm2fork.com/peers/peer0.farm2fork.com/tls:/etc/hyperledger/fabric/tls
      - peer0.farm2fork.com:/var/hyperledger/production

  cli.farm2fork.com:
    image: hyperledger/fabric-tools:${FABRIC_VERSION:-3.1.4}
    container_name: cli.farm2fork.com
    tty: true
    stdin_open: true
    working_dir: /opt/farm2fork
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric/config
      - CHANNEL_NAME=${CHANNEL_NAME:-farm2forkchannel}
      - CORE_PEER_ID=cli.farm2fork.com
      - CORE_PEER_ADDRESS=peer0.farm2fork.com:7051
      - CORE_PEER_LOCALMSPID=Farm2ForkMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/peerOrganizations/farm2fork.com/users/Admin@farm2fork.com/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/peerOrganizations/farm2fork.com/peers/peer0.farm2fork.com/tls/ca.crt
      - ORDERER_ADMIN_ADDRESS=${ORDERER_ADMIN_ADDRESS:-orderer.farm2fork.com:9443}
      - ORDERER_CA=/etc/hyperledger/fabric/ordererOrganizations/farm2fork.com/orderers/orderer.farm2fork.com/tls/ca.crt
      - ORDERER_ADMIN_TLS_SIGN_CERT=/etc/hyperledger/fabric/ordererOrganizations/farm2fork.com/users/Admin@farm2fork.com/tls/client.crt
      - ORDERER_ADMIN_TLS_PRIVATE_KEY=/etc/hyperledger/fabric/ordererOrganizations/farm2fork.com/users/Admin@farm2fork.com/tls/client.key
      - CHANNEL_BLOCK_FILE=/opt/farm2fork/channel-artifacts/${CHANNEL_NAME:-farm2forkchannel}.block
    command: sleep infinity
    depends_on:
      - orderer.farm2fork.com
      - peer0.farm2fork.com
    volumes:
      - ../config:/etc/hyperledger/fabric/config
      - ../organizations:/etc/hyperledger/fabric
      - ../channel-artifacts:/opt/farm2fork/channel-artifacts

volumes:
  orderer.farm2fork.com:
  peer0.farm2fork.com:
